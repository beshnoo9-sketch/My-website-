<!DOCTYPE html>
<html>
<head>
  <title>Beshno Pro Shop</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body {font-family: Arial; background:#f2f2f2;}
    header {background:black;color:white;padding:15px;text-align:center;}
    .products {display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;padding:20px;}
    .card {background:white;padding:10px;border-radius:10px;}
    img {width:100%;}
    button {background:green;color:white;padding:10px;border:none;width:100%;}
  </style>
</head>

<body>

<header>
  <h2>Beshno Pro Store</h2>
</header>

<div class="products" id="products"></div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection("products").get().then((querySnapshot) => {
  querySnapshot.forEach((doc) => {
    let data = doc.data();

    document.getElementById("products").innerHTML += `
      <div class="card">
        <img src="${data.img}">
        <h4>${data.name}</h4>
        <p>${data.price}</p>
        <a href="https://wa.me/01625097513">
          <button>Order</button>
        </a>
      </div>
    `;
  });
});
</script>

</body>
</html>
<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="img" placeholder="Image URL">

<button onclick="addProduct()">Add</button>

<script>
function addProduct() {
  db.collection("products").add({
    name: document.getElementById("name").value,
    price: document.getElementById("price").value,
    img: document.getElementById("img").value
  });
}
</script>

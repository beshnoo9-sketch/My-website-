<!DOCTYPE html>
<html>
<head>
    <title>My Marketing Website</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }
        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background: #555;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        .container {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
        }
        button {
            background: green;
            color: white;
            padding: 10px;
            border: none;
        }
    </style>
</head>

<body>

<header>
    <h1>My Marketing Website</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Videos</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

    <div class="card">
        <h2>🔥 Best Product</h2>
        <p>Buy this amazing product now!</p>
        <a href="YOUR_AFFILIATE_LINK">
            <button>Buy Now</button>
        </a>
    </div>

    <div class="card">
        <h2>🎬 Watch Video</h2>
        <iframe width="100%" height="250"
        src="https://www.youtube.com/embed/YOUR_VIDEO_ID">
        </iframe>
    </div>

</div>

</body>
</html>
